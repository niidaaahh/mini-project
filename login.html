<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Assisted Care for Elderly</title>
    <style>
        /* ============================================
           GLOBAL RESET & BASE STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Soft pastel gradient background - healthcare theme */
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 50%, #fff9c4 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ============================================
           HEADER SECTION
           ============================================ */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-title {
            font-size: 2.5rem;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #5a6c7d;
            font-weight: 400;
        }

        /* ============================================
           LOGIN CARD CONTAINER
           ============================================ */
        .login-container {
            background: #ffffff;
            border-radius: 25px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            padding: 45px 40px;
            max-width: 550px;
            width: 100%;
        }

        /* ============================================
           ROLE SELECTION SECTION
           ============================================ */
        .role-selection {
            margin-bottom: 35px;
        }

        .role-label {
            font-size: 1.4rem;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 20px;
            display: block;
        }

        .role-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* Hide default radio buttons */
        .role-options input[type="radio"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        /* Custom pill-style buttons */
        .role-option {
            flex: 1;
            min-width: 140px;
        }

        .role-option label {
            display: block;
            padding: 18px 20px;
            background: #f5f5f5;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            color: #5a6c7d;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Hover effect for role buttons */
        .role-option label:hover {
            background: #e8f4f8;
            border-color: #81d4fa;
            transform: translateY(-2px);
        }

        /* Selected state for role buttons */
        .role-option input[type="radio"]:checked + label {
            background: #bbdefb;
            border-color: #42a5f5;
            color: #1565c0;
        }

        /* Focus state for accessibility */
        .role-option input[type="radio"]:focus + label {
            outline: 3px solid #64b5f6;
            outline-offset: 2px;
        }

        /* ============================================
           FORM INPUT SECTION
           ============================================ */
        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            font-size: 1.3rem;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .form-group input {
            width: 100%;
            padding: 18px 20px;
            font-size: 1.2rem;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            background: #fafafa;
            color: #2c3e50;
            transition: all 0.3s ease;
        }

        /* Input focus state - high contrast */
        .form-group input:focus {
            outline: none;
            border-color: #42a5f5;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.1);
        }

        /* Input placeholder styling */
        .form-group input::placeholder {
            color: #9e9e9e;
        }

        /* ============================================
           LOGIN BUTTON
           ============================================ */
        .login-button {
            width: 100%;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(67, 160, 71, 0.3);
        }

        .login-button:hover {
            background: linear-gradient(135deg, #43a047 0%, #2e7d32 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(67, 160, 71, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        /* Focus state for keyboard navigation */
        .login-button:focus {
            outline: 3px solid #81c784;
            outline-offset: 2px;
        }

        /* ============================================
           BACK TO HOME LINK
           ============================================ */
        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: #5a6c7d;
            font-size: 1.2rem;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .back-link a:hover {
            color: #42a5f5;
            background: #e3f2fd;
        }

        .back-link a:focus {
            outline: 3px solid #42a5f5;
            outline-offset: 2px;
        }

        /* ============================================
           RESPONSIVE DESIGN FOR MOBILE
           ============================================ */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            .login-container {
                padding: 35px 25px;
            }

            .role-options {
                flex-direction: column;
            }

            .role-option {
                min-width: 100%;
            }

            .form-group label,
            .role-label {
                font-size: 1.2rem;
            }

            .form-group input,
            .login-button {
                font-size: 1.1rem;
            }

            .role-option label {
                font-size: 1.2rem;
                padding: 16px 18px;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 1.6rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .login-container {
                padding: 30px 20px;
            }
        }

        /* ============================================
           ACCESSIBILITY ENHANCEMENTS
           ============================================ */
        /* Ensure all interactive elements are keyboard accessible */
        *:focus-visible {
            outline: 3px solid #42a5f5;
            outline-offset: 2px;
        }

        /* High contrast for text readability */
        ::selection {
            background: #bbdefb;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <!-- ============================================
         HEADER SECTION
         ============================================ -->
    <div class="header">
        <h1 class="main-title">AI Assisted Care for Elderly</h1>
        <p class="subtitle">Secure Login</p>
    </div>

    <!-- ============================================
         LOGIN CARD
         ============================================ -->
    <div class="login-container">
        <form id="loginForm" onsubmit="handleLogin(event)">
            
            <!-- ROLE SELECTION -->
            <div class="role-selection">
                <span class="role-label">Select Your Role</span>
                <div class="role-options">
                    <div class="role-option">
                        <input type="radio" id="role-user" name="role" value="user" required>
                        <label for="role-user">User</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="role-caregiver" name="role" value="caregiver">
                        <label for="role-caregiver">Caregiver</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="role-admin" name="role" value="admin">
                        <label for="role-admin">Admin</label>
                    </div>
                </div>
            </div>

            <!-- USER ID INPUT -->
            <div class="form-group">
                <label for="userId">User ID</label>
                <input 
                    type="text" 
                    id="userId" 
                    name="userId" 
                    placeholder="Enter your User ID" 
                    required
                    autocomplete="username"
                >
            </div>

            <!-- PASSWORD INPUT -->
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your Password" 
                    required
                    autocomplete="current-password"
                >
            </div>

            <!-- LOGIN BUTTON -->
            <button type="submit" class="login-button">Login</button>
        </form>

        <!-- BACK TO HOME LINK -->
        <div class="back-link">
            <a href="home.html">← Back to Home</a>
        </div>
    </div>

    <!-- ============================================
         JAVASCRIPT FOR FORM HANDLING
         ============================================ -->
    <script>
        /**
         * Handles the login form submission
         * This is a placeholder function - integrate with your backend
         * @param {Event} event - The form submit event
         */
       function handleLogin(event) {
    event.preventDefault();

    const role = document.querySelector('input[name="role"]:checked').value;
    const userId = document.getElementById('userId').value;
    const password = document.getElementById('password').value;

    if (!role || !userId || !password) {
        alert("Please fill all fields.");
        return;
    }

    if (role === "user") {
        window.location.href = "elderly-care.html";  // change if needed
    } 
    else if (role === "caregiver") {
        window.location.href = "caregiver-home.html";
    } 
    else if (role === "admin") {
        window.location.href = "admin-dashboard.html";
    }
}

        // Auto-focus on first input when page loads (accessibility)
        window.addEventListener('load', function() {
            document.getElementById('role-user').focus();
        });
    </script>
</body>
</html>
